services:
  - type: web
    name: personal-blog
    env: node
    region: singapore
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci --omit=dev
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/posts
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
